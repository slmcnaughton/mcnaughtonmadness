<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Clipboard with missed picks / X mark -->
  <!-- Clipboard body -->
  <rect x="35" y="40" width="130" height="165" rx="10" fill="#95A5A6" stroke="#7F8C8D" stroke-width="3"/>
  <!-- Clipboard inner (paper) -->
  <rect x="48" y="60" width="104" height="132" rx="4" fill="#ECF0F1"/>
  <!-- Clipboard clip at top -->
  <rect x="70" y="28" width="60" height="28" rx="6" fill="#7F8C8D"/>
  <rect x="82" y="22" width="36" height="16" rx="8" fill="#BDC3C7" stroke="#7F8C8D" stroke-width="2"/>
  <!-- Lines on clipboard (pick rows) -->
  <rect x="60" y="75" width="80" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="60" y="95" width="80" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="60" y="115" width="80" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="60" y="135" width="80" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="60" y="155" width="80" height="6" rx="2" fill="#BDC3C7"/>
  <!-- Big red X over clipboard -->
  <line x1="55" y1="65" x2="145" y2="185" stroke="#E74C3C" stroke-width="14" stroke-linecap="round"/>
  <line x1="145" y1="65" x2="55" y2="185" stroke="#E74C3C" stroke-width="14" stroke-linecap="round"/>
  <!-- Clock icon bottom-right -->
  <circle cx="155" cy="185" r="28" fill="#E74C3C" stroke="#C0392B" stroke-width="3"/>
  <circle cx="155" cy="185" r="20" fill="#fff"/>
  <line x1="155" y1="175" x2="155" y2="185" stroke="#E74C3C" stroke-width="3" stroke-linecap="round"/>
  <line x1="155" y1="185" x2="165" y2="190" stroke="#E74C3C" stroke-width="3" stroke-linecap="round"/>
</svg>